<style>
  :root{--bg:#fafaf7;--ink:#0d1b2a;--ink-2:#33415c;--muted:#5c6b80;--line:#e5e4dd;--card:#ffffff;--brand:#c8431f;--brand-2:#f2a83b;--bad:#b3261e}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}

  /* Login screen */
  #loginScreen{display:grid;place-items:center;min-height:100vh;background-image:radial-gradient(ellipse at top right,rgba(200,67,31,.08),transparent 60%),radial-gradient(ellipse at bottom left,rgba(242,168,59,.07),transparent 50%)}
  #loginScreen.hidden{display:none}
  .gate{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:36px;box-shadow:0 4px 24px rgba(13,27,42,.08);text-align:center}
  .mark{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);display:grid;place-items:center;color:white;font-family:'Fraunces',serif;font-weight:600;font-size:1.4rem;margin:0 auto 16px}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.6rem;margin:0 0 6px;color:var(--ink)}
  .sub{color:var(--muted);font-size:.92rem;margin:0 0 28px}
  form{display:flex;flex-direction:column;gap:12px;text-align:left}
  label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:6px}
  input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:.95rem;background:#fcfbf7;transition:all .12s ease}
  input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(200,67,31,.08)}
  button{padding:12px;border:none;background:var(--brand);color:#fff;border-radius:8px;font-family:inherit;font-size:.95rem;font-weight:500;cursor:pointer;transition:background .12s ease;margin-top:6px}
  button:hover{background:#a83716}
  button:disabled{opacity:.6;cursor:wait}
  .err{display:none;margin-top:14px;padding:10px 12px;background:#fbe5e3;color:var(--bad);border-radius:6px;font-size:.88rem;text-align:center}
  .err.show{display:block}
  .foot{margin-top:24px;font-size:.78rem;color:var(--muted);text-align:center}

  /* Authenticated app shell */
  #appShell{display:none;height:100vh;width:100%}
  #appShell.show{display:block}
  #appFrame{width:100%;height:100%;border:0;display:block}
  #authBar{position:fixed;bottom:14px;right:14px;z-index:99999;background:#0d1b2a;color:#fff;font:500 12px Inter,sans-serif;padding:8px 14px;border-radius:99px;box-shadow:0 4px 12px rgba(0,0,0,.2);display:none}
  #appShell.show + #authBar{display:block}
  #authBar a{color:#f2a83b;text-decoration:none;margin-left:6px;cursor:pointer}
  #authBar a:hover{text-decoration:underline}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="gate">
    <div class="mark">C</div>
    <h1>Crisp RGM</h1>
    <p class="sub">Restricted access. Enter your credentials.</p>
    <form id="loginForm" autocomplete="on">
      <div>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit" id="submitBtn">Sign in →</button>
    </form>
    <div class="err" id="err">Invalid credentials.</div>
    <div class="foot">Protected with AES-256 · PBKDF2 (250K iter)</div>
  </div>
</div>

const $loginScreen = document.getElementById('loginScreen');
const $appShell    = document.getElementById('appShell');
const $appFrame    = document.getElementById('appFrame');
const $authBar     = document.getElementById('authBar');
const $u = document.getElementById('username');
const $p = document.getElementById('password');
const $btn = document.getElementById('submitBtn');
const $err = document.getElementById('err');

let DECRYPTED = { home: null, analyzer: null };

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $err.classList.remove('show');
  $btn.disabled = true;
  $btn.textContent = 'Verifying…';
  try {
    const effectivePw = $u.value.trim() + '::' + $p.value;
    DECRYPTED.home     = await decryptBlob(PAYLOAD.home,     effectivePw, PAYLOAD.iter);
    DECRYPTED.analyzer = await decryptBlob(PAYLOAD.analyzer, effectivePw, PAYLOAD.iter);
    sessionStorage.setItem('crisp_user', $u.value.trim());
    sessionStorage.setItem('crisp_home', DECRYPTED.home);
    sessionStorage.setItem('crisp_analyzer', DECRYPTED.analyzer);
    enterApp();
  } catch (err) {
    $err.classList.add('show');
    $btn.disabled = false;
    $btn.textContent = 'Sign in →';
    $p.value = '';
    $p.focus();
  }
});

// Restore session if user already authed in this tab
(function tryRestore(){
  const h = sessionStorage.getItem('crisp_home');
  const a = sessionStorage.getItem('crisp_analyzer');
  if (h && a) {
    DECRYPTED.home = h;
    DECRYPTED.analyzer = a;
    enterApp();
  }
})();

function enterApp(){
  $loginScreen.classList.add('hidden');
  $appShell.classList.add('show');
  $authBar.style.display = 'block';
  document.getElementById('bUser').textContent = sessionStorage.getItem('crisp_user') || 'admin';
  document.getElementById('goHome').onclick = () => loadPage('home');
  document.getElementById('goAnalyzer').onclick = () => loadPage('analyzer');
  document.getElementById('doLogout').onclick = () => { sessionStorage.clear(); location.reload(); };
  // Pick page based on hash
  const target = (location.hash.replace('#','') === 'analyzer') ? 'analyzer' : 'home';
  loadPage(target);
}

function loadPage(which){
  location.hash = which;
  const raw = DECRYPTED[which] || sessionStorage.getItem('crisp_'+which);
  if (!raw) return;
  // Inject <base href="/"> so relative URLs (sample CSV, internal links) resolve correctly
  // and rewrite cross-page links to call parent's loadPage via postMessage
  let html = raw;
  // Insert <base> right after <head> if not already present
  if (!/<base\s/i.test(html)) {
    html = html.replace(/<head([^>]*)>/i, `<head$1><base href="/">`);
  }
  // Rewrite cross-page hrefs to javascript handlers that call parent
  html = html.replace(/href="\/analyzer\.html"/g, `href="javascript:void(0)" onclick="parent.crispShow('analyzer')"`);
  html = html.replace(/href="\/index\.html"/g,    `href="javascript:void(0)" onclick="parent.crispShow('home')"`);
  html = html.replace(/href="\/"/g,               `href="javascript:void(0)" onclick="parent.crispShow('home')"`);
  $appFrame.srcdoc = html;
}

// Expose for iframe to call back
window.crispShow = loadPage;

async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false, ['decrypt']
  );
}

async function decryptBlob(b64, password, iterations) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt  = raw.slice(0, 16);
  const nonce = raw.slice(16, 28);
  const ct    = raw.slice(28);
  const key = await deriveKey(password, salt, iterations);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, ct);
  return new TextDecoder().decode(decrypted);
}
